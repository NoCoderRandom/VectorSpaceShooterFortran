name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential gfortran gcc pkg-config libsdl2-dev
      - name: Build
        run: ./scripts/build.sh
      - name: Test
        run: ./scripts/test.sh
